# Simple workflow for deploying static content to GitHub Pages#将静态内容部署到GitHub页面的简单工作流#将静态内容部署到GitHub页面的简单工作流
name名称：将静态内容部署到页面: Deploy static content to Pages

on   ::
  #针对默认分支进行推送# Runs on pushes targeting the default branch
  push   推动::
    branches: ["main"]   分支机构(“main"):

  # Allows you to run this workflow manually from the Actions tab#允许您从Actions选项卡手动运行此工作流
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages#设置GITHUB_TOKEN的权限以允许部署到GitHub页面
permissions:   权限:
  contents: read   内容:读
  pages: write   页:写
  id-token: write   id-token:写

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.#只允许一次并发部署，跳过正在运行的队列和最新队列之间的队列
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.#但是，不要取消正在进行的运行，因为我们希望允许这些生产环境部署完成。
concurrency:   并发性:
  group: "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   "pages"   group: "pages"
  cancel-in-progress: false   cancel-in-progress:假

jobs:   工作:
  # Single deploy job since we're just deploying#单个部署任务，因为我们只是在部署
  deploy:   部署:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
